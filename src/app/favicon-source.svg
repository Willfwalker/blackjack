<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Blackjack Counting Lab">
  <defs>
    <radialGradient id="felt-glow" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#1b1b1b" />
      <stop offset="58%" stop-color="#070707" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    <linearGradient id="gold" x1="54" y1="42" x2="202" y2="210" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff3a3" />
      <stop offset="35%" stop-color="#d7a83f" />
      <stop offset="68%" stop-color="#b8860b" />
      <stop offset="100%" stop-color="#ffe48a" />
