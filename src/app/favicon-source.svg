  <rect width="256" height="256" rx="56" fill="url(#felt-glow)" />
  <rect x="18" y="18" width="220" height="220" rx="44" fill="none" stroke="#d7a83f" stroke-width="8" />
  <rect x="30" y="30" width="196" height="196" rx="34" fill="none" stroke="#ffe48a" stroke-opacity="0.26" stroke-width="2" />

  <text
