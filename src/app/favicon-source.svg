  <path d="M70 187c30 18 82 20 119 0" fill="none" stroke="#f5d36a" stroke-width="5" stroke-linecap="round" opacity="0.85" />
  <circle cx="204" cy="56" r="7" fill="#d7a83f" opacity="0.9" />
  <circle cx="52" cy="200" r="5" fill="#ffe48a" opacity="0.55" />
